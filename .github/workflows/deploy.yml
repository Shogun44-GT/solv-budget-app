name: Deploy — Production

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  # ── Tests avant déploiement ────────────────────────────────
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: cd backend && pip install -r requirements.txt aiosqlite
      - run: cd backend && pytest app/tests/ -v --cov=app --cov-fail-under=70
        env:
          SECRET_KEY: ci_secret_key
          JWT_SECRET_KEY: ci_jwt_key
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          ANTHROPIC_API_KEY: test_key
          POSTGRES_PASSWORD: test

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: 'frontend/package-lock.json' }
      - run: cd frontend && npm ci && npm run type-check

  # ── Build & Push Docker images ─────────────────────────────
  build:
    name: Build Docker Images
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file:    ./frontend/Dockerfile.prod
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Déploiement Railway / VPS ──────────────────────────────
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/coach-budget
            git pull origin main
            export BACKEND_TAG=${{ github.sha }}
            export FRONTEND_TAG=${{ github.sha }}
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d --no-build
            docker-compose -f docker-compose.prod.yml exec -T backend alembic upgrade head
            echo "✅ Déploiement ${{ github.sha }} terminé"
