name: CI — Tests & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ─────────────────────────────────────────
  backend-tests:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install aiosqlite  # Pour les tests en mémoire

      - name: Run tests with coverage
        env:
          SECRET_KEY: test_secret_key_for_ci
          JWT_SECRET_KEY: test_jwt_key_for_ci
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          ANTHROPIC_API_KEY: test_key
          POSTGRES_PASSWORD: test
        run: |
          cd backend
          pytest app/tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml

  # ── Frontend Tests ─────────────────────────────────────────
  frontend-tests:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: TypeScript check
        run: cd frontend && npm run type-check

      - name: Lint
        run: cd frontend && npm run lint || true

  # ── Docker Build ───────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t coach-budget-backend ./backend
      - name: Build frontend image
        run: docker build -t coach-budget-frontend ./frontend
